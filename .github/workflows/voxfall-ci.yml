name: voxfall-ci

on:
  push:
    branches: ["main"]
    paths: ["voxfall/**", ".github/workflows/voxfall-ci.yml"]
  pull_request:
    paths: ["voxfall/**", ".github/workflows/voxfall-ci.yml"]

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # The three shipping platforms (DESIGN.md §11.2). Ubuntu also stands in
        # for the headless dedicated server build.
        os: [ubuntu-22.04, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B voxfall/build -S voxfall -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build voxfall/build --config Release -j 4

      - name: Test
        run: ctest --test-dir voxfall/build --build-config Release --output-on-failure

      - name: Headless demo smoke run
        shell: bash
        run: |
          demo=voxfall/build/voxfall_sim
          [ -f "$demo" ] || demo=voxfall/build/Release/voxfall_sim.exe
          "$demo" 1337 | tail -5
